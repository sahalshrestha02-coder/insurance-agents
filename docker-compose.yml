version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - ./insurance.db:/app/insurance.db
      - ./chroma_db:/app/chroma_db
      - ./knowledge_base:/app/knowledge_base
      - ./prompts:/app/prompts
    restart: always
